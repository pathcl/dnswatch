name: Release

# Trigger on version tags only (e.g. v1.0.0, v0.2.1).
# Push to main/master does not trigger a release.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to create GitHub releases and upload assets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install BPF build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libbpf-dev \
            linux-headers-generic

      - name: Compile BPF program
        run: |
          # Point clang at the generic kernel headers installed above.
          # The BPF target does not need kernel headers that match the
          # runner's kernel — libbpf-dev provides the BPF-specific headers.
          KERN_HEADERS=$(ls -d /usr/src/linux-headers-*-generic 2>/dev/null | head -1)
          clang -O2 -g -Wall -Wextra -target bpf \
            -I/usr/include/x86_64-linux-gnu \
            ${KERN_HEADERS:+-I${KERN_HEADERS}/include} \
            -c bpf/dns_capture.c \
            -o internal/capture/dns_capture.o

      - name: Build binary
        run: |
          # CGO_ENABLED=0 produces a fully static binary — no glibc dependency
          # on the target system. Required since modernc/sqlite (briefme) is
          # not a dep here; cilium/ebpf is pure Go so static build is safe.
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -trimpath \
            -ldflags "-s -w -X main.version=${{ github.ref_name }}" \
            -o dnswatch-linux-amd64 \
            ./cmd/dnswatch

      - name: Checksum
        run: sha256sum dnswatch-linux-amd64 > dnswatch-linux-amd64.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          # Pull release notes from the annotated tag message.
          # Use: git tag -a v1.0.0 -m "release notes here"
          body: ${{ github.event.head_commit.message }}
          files: |
            dnswatch-linux-amd64
            dnswatch-linux-amd64.sha256
